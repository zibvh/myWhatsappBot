services:
  - type: web
    name: whatsapp-bot
    runtime: docker
    plan: starter # change to "free" to test at no cost — see README for the tradeoffs
    healthCheckPath: /health
    envVars:
      - key: OWNER_NUMBER
        sync: false
      - key: SESSION_ID
        sync: false
      - key: PREFIX
        value: "."
      - key: MODE
        value: public
      - key: MAX_WARNINGS
        value: "3"
      - key: BOT_NAME
        value: MyBot
